name = "hn-hrcb"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "<your-d1-database-id>"  # wrangler d1 list

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "<your-kv-namespace-id>"  # wrangler kv namespace list

# Cron trigger lives in a separate Worker (functions/cron.ts)
# Deploy cron separately: wrangler deploy functions/cron.ts --name hn-hrcb-cron
# Secrets (set via `wrangler secret put`):
# ANTHROPIC_API_KEY

[vars]
DAILY_EVAL_BUDGET = "50"
