name = "hn-hrcb-consumer-workers-ai"
main = "functions/consumer-workers-ai.ts"
compatibility_date = "2026-02-01"

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "8d46e768-e02d-421f-93f6-6dfa06a378c5"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "ffe31e8bd21f43169e81f6d6137772bf"

[[r2_buckets]]
binding = "CONTENT_SNAPSHOTS"
bucket_name = "hrcb-content-snapshots"

[ai]
binding = "AI"

# Workers AI models — uses Cloudflare AI binding (no API key needed)
[[queues.consumers]]
queue = "hrcb-eval-workers-ai"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

# No secrets needed — Workers AI uses the AI binding
