name = "hn-hrcb-cron"
main = "functions/cron.ts"
compatibility_date = "2026-02-01"

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "<your-d1-database-id>"  # wrangler d1 list

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "<your-kv-namespace-id>"  # wrangler kv namespace list

[[r2_buckets]]
binding = "CONTENT_SNAPSHOTS"
bucket_name = "hrcb-content-snapshots"

[triggers]
crons = ["* * * * *"]

[[queues.producers]]
queue = "hrcb-eval-queue"
binding = "EVAL_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-deepseek"
binding = "DEEPSEEK_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-trinity"
binding = "TRINITY_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-nemotron"
binding = "NEMOTRON_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-step"
binding = "STEP_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-qwen"
binding = "QWEN_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-llama"
binding = "LLAMA_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-mistral"
binding = "MISTRAL_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-hermes"
binding = "HERMES_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-workers-ai"
binding = "WORKERS_AI_QUEUE"

# Secrets (set via `wrangler secret put --name hn-hrcb-cron`):
# ANTHROPIC_API_KEY
# CRON_SECRET
