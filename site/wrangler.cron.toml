name = "hn-hrcb-cron"
main = "functions/cron.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "8d46e768-e02d-421f-93f6-6dfa06a378c5"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "ffe31e8bd21f43169e81f6d6137772bf"

[triggers]
crons = ["* * * * *"]

[[queues.producers]]
queue = "hrcb-eval-queue"
binding = "EVAL_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-deepseek"
binding = "DEEPSEEK_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-trinity"
binding = "TRINITY_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-nemotron"
binding = "NEMOTRON_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-step"
binding = "STEP_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-qwen"
binding = "QWEN_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-llama"
binding = "LLAMA_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-mistral"
binding = "MISTRAL_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-hermes"
binding = "HERMES_QUEUE"

[[queues.producers]]
queue = "hrcb-eval-workers-ai"
binding = "WORKERS_AI_QUEUE"

# Secrets (set via `wrangler secret put --name hn-hrcb-cron`):
# ANTHROPIC_API_KEY
# CRON_SECRET
