name = "hn-hrcb-consumer-openrouter"
main = "functions/consumer-openrouter.ts"
compatibility_date = "2026-02-01"

# Fork setup: replace the IDs below with your own Cloudflare resources.
# These are infrastructure identifiers, not secrets — safe to commit.
#   D1:    wrangler d1 create hrcb-db        → copy the database_id
#   KV:    wrangler kv namespace create CONTENT_CACHE → copy the id
#   R2:    wrangler r2 bucket create hrcb-content-snapshots
#   Queue: wrangler queues create <name>     (names must match exactly)
# Secrets stay in .dev.vars (local) or: wrangler secret put --name <worker-name>

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "8d46e768-e02d-421f-93f6-6dfa06a378c5"

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "ffe31e8bd21f43169e81f6d6137772bf"

[[r2_buckets]]
binding = "CONTENT_SNAPSHOTS"
bucket_name = "hrcb-content-snapshots"

# OpenRouter models — concurrency=1 each to stay under free tier rate limits
[[queues.consumers]]
queue = "hrcb-eval-deepseek"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-trinity"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-nemotron"
