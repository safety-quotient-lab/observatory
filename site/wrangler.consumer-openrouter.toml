name = "hn-hrcb-consumer-openrouter"
main = "functions/consumer-openrouter.ts"
compatibility_date = "2026-02-01"

[[d1_databases]]
binding = "DB"
database_name = "hrcb-db"
database_id = "<your-d1-database-id>"  # wrangler d1 list

[[kv_namespaces]]
binding = "CONTENT_CACHE"
id = "<your-kv-namespace-id>"  # wrangler kv namespace list

[[r2_buckets]]
binding = "CONTENT_SNAPSHOTS"
bucket_name = "hrcb-content-snapshots"

# OpenRouter models — concurrency=1 each to stay under free tier rate limits
[[queues.consumers]]
queue = "hrcb-eval-deepseek"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-trinity"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-nemotron"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-step"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-qwen"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-llama"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-mistral"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[[queues.consumers]]
queue = "hrcb-eval-hermes"
max_batch_size = 1
max_concurrency = 1
max_retries = 2
dead_letter_queue = "hrcb-eval-dlq"

[vars]
RATE_LIMIT_MAX_BACKOFF_SECONDS = "120"

# Secrets (set via `wrangler secret put --name hn-hrcb-consumer-openrouter`):
# OPENROUTER_API_KEY
